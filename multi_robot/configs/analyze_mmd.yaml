# -------------------
# ANALYSIS CONFIG
# -------------------

# List of data directories to process. The script will loop through each directory.
log_paths:
  ##---------------------- Highway ----------------------
  # - "results/EnvHighways2DRobotPlanarDiskRandom/dummy_logs.log"
  ### -------------- Empty -------------------
  # - "results/EnvEmpty2DRobotPlanarDiskRandom/dummy_logs.log"
  ### ----------------- Conveyor -------------------
  - "results/EnvConveyor2DRobotPlanarDiskRandom/dummy_logs.log"

switches:
  plot_trajectories: false
  plot_velocity_stats: false
  save_plots: false
  save_stats_json: true

constants:
  EPS: 1.0e-6
  VEL_TOL: 5.0e-5  # Tolerance for velocity checks
  ## --------------- Highway -------------------
  # DEFAULT_MAX_VEL: 0.647  # Default maximum velocity threshold (80% of max action)
  # DEFAULT_MAX_VEL: 0.781  # (90% of max action)
  # DEFAULT_MAX_VEL: 0.878 # (95% of max action)
  ## --------------- Empty -------------------
  ##[0.675, 0.692, 0.703]
  # DEFAULT_MAX_VEL: 0.675  # (75% of max action)
  # DEFAULT_MAX_VEL: 0.692  # (90% of max action)
  # DEFAULT_MAX_VEL: 0.703  # (95% of max action)
  ## --------------- Conveyor -------------------
  ## [1.21, 1.46, 1.76]
  # DEFAULT_MAX_VEL: 1.21  # (85% of max action)
  # DEFAULT_MAX_VEL: 1.46  # (90% of max action)
  DEFAULT_MAX_VEL: 1.76  # (95% of max action)
  ## --------------- DropRegion -------------------
  ## [0.928, 1.13, 1.34]
  # DEFAULT_MAX_VEL: 0.928  # (85% of max action)
  # DEFAULT_MAX_VEL: 1.13  # (90% of max action)
  # DEFAULT_MAX_VEL: 1.34  # (95% of max action)

  VEL_HIST_QUANTILES: [0.75, 0.8, 0.85, 0.9, 0.95, 0.99]

# Plotting-specific parameters.
plotting:
  # Number of initial states figures to plot
  num_inits_plot: 10
  # Number of trajectory tuples to plot
  num_trj_tups_plot: 64
  # Trajectory plotting settings
  traj_plot_xlim: [-1, 1]
  traj_plot_ylim: [-1, 1]
  traj_plot_h_end: 64
  # Velocity histogram settings
  vel_hist_bins: 100

data:
  default_trained_models_dir: "default_trained_models_dir"
